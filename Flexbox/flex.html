<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flexbox Assignment</title>
  <link rel="stylesheet" href="flex.css" />
</head>

<body>

  <!-- FLEX 1 -->
  <div class="flexOne">
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
  </div>

  <!-- FLEX 2 -->
  <div class="flexTwo">
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
  </div>

  <!-- FLEX 3 -->
  <div class="flexThree">
    <div class="square">1</div>
    <div class="square">2</div>
    <div class="square">3</div>
  </div>

  <!-- FLEX 4 -->
  <div class="flexFour">
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
    <div class="square"></div>
  </div>

  <!-- FLEX 5 -->
  <div class="flexFive">
    <div class="item"></div>
    <div class="item" id="grow"></div>
    <div class="item"></div>
  </div>

  <!-- FLEX 6 -->
  <div class="flexSix">
    <div class="one">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>

    <div class="two">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>

    <div class="three">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>
  </div>

  <!-- FLEX 7 -->
  <div class="flexSeven">
    <div class="one">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>

    <div class="two">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>

    <div class="three">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>

    <div class="four">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>
  </div>

  <!-- FLEX 8 -->
  <div class="flexEight">
    <div class="one"><div class="square"></div></div>
    <div class="two"><div class="square"></div></div>
    <div class="three"><div class="square"></div></div>
  </div>

  <!-- FLEX 9 -->
  <div class="flexNine">
    <div class="square"></div>
    <div class="square"></div>
    <div class="square" id="special"></div>
    <div class="square"></div>
  </div>

</body>
</html>
